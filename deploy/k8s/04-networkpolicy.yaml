apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pdfsigner-ingress
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: pdfsigner
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: signer
    ports:
    - protocol: TCP
      port: 8090
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-ingress
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: uploader
    - podSelector:
        matchLabels:
          app: downloader
    - podSelector:
        matchLabels:
          app: signer
    ports:
    - protocol: TCP
      port: 6379
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-ingress

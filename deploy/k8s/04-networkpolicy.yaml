---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: minio-ingress
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: minio
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: uploader
    - podSelector:
        matchLabels:
          app: downloader
    - podSelector:
        matchLabels:
          app: signer
    ports:
    - protocol: TCP
      port: 9000
  - from:
    - podSelector:
        matchLabels:
          job-name: minio-init
    ports:
    - protocol: TCP
      port: 9000

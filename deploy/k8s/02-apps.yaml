apiVersion: apps/v1
kind: Deployment
metadata:
  name: uploader
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uploader
  template:
    metadata:
      labels:
        app: uploader
    spec:
      volumes:
      - name: uploader-tmp
        emptyDir: {}
      containers:
      - name: uploader
        image: ghcr.io/yarlkot1904/signer/uploader:deploy-2026-04-15-1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        - containerPort: 9100
        volumeMounts:
        - name: uploader-tmp
          mountPath: /tmp
        env:
        - name: MINIO_ENDPOINT
          valueFrom: {configMapKeyRef: {name: signer-config, key: MINIO_ENDPOINT}}
        - name: MINIO_ID
          valueFrom: {secretKeyRef: {name: signer-secrets, key: MINIO_ID}}
        - name: MINIO_SECRET
          valueFrom: {secretKeyRef: {name: signer-secrets, key: MINIO_SECRET}}
        - name: MINIO_BUCKET
          valueFrom: {configMapKeyRef: {name: signer-config, key: MINIO_BUCKET}}
        - name: MINIO_REGION
          valueFrom: {configMapKeyRef: {name: signer-config, key: MINIO_REGION}}
        - name: REDIS_ADDR
          valueFrom: {configMapKeyRef: {name: signer-config, key: REDIS_ADDR}}
        - name: RABBIT_URL
          valueFrom: {secretKeyRef: {name: signer-secrets, key: RABBIT_URL}}
        - name: HTTP_PORT
          value: "8080"
        - name: METRICS_PORT
          valueFrom: {configMapKeyRef: {name: signer-config, key: METRICS_PORT}}
        - name: HTTP_READ_HEADER_TIMEOUT
          valueFrom: {configMapKeyRef: {name: signer-config, key: HTTP_READ_HEADER_TIMEOUT}}
        - name: HTTP_READ_TIMEOUT
          valueFrom: {configMapKeyRef: {name: signer-config, key: HTTP_READ_TIMEOUT}}
        - name: HTTP_WRITE_TIMEOUT
          valueFrom: {configMapKeyRef: {name: signer-config, key: HTTP_WRITE_TIMEOUT}}
        - name: HTTP_IDLE_TIMEOUT
          valueFrom: {configMapKeyRef: {name: signer-config, key: HTTP_IDLE_TIMEOUT}}
        - name: SHUTDOWN_TIMEOUT
          valueFrom: {configMapKeyRef: {name: signer-config, key: SHUTDOWN_TIMEOUT}}
        - name: DEPENDENCY_TIMEOUT
          valueFrom: {configMapKeyRef: {name: signer-config, key: DEPENDENCY_TIMEOUT}}
        - name: UPLOAD_MAX_BYTES
          valueFrom: {configMapKeyRef: {name: signer-config, key: UPLOAD_MAX_BYTES}}
        readinessProbe:
          httpGet: {path: /health, port: 8080}
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet: {path: /health, port: 8080}
          initialDelaySeconds: 15
          periodSeconds: 10
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: uploader-svc
  namespace: default
spec:
  ports:
  - port: 80
    targetPort: 8080
    name: http
  - port: 9100
    targetPort: 9100
    name: metrics
  selector:
    app: uploader
---

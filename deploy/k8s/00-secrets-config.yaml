apiVersion: v1
kind: Secret
metadata:
  name: signer-secrets
  namespace: default
type: Opaque
stringData:
  MINIO_ID: "minioadmin"
  MINIO_SECRET: "minioadmin"

  POSTGRES_USER: "user"
  POSTGRES_PASSWORD: "password"
  POSTGRES_DB: "signer_db"

  DB_DSN: "postgres://user:password@postgres:5432/signer_db"
  RABBIT_URL: "amqp://user:password@rabbitmq:5672/"

  MASTER_KEY_HEX: "1ec51ff7a833d03b3852576207ad67ba4667d09af5cf04c606875d91812b383c"
  RABBIT_USER: "user"
  RABBIT_PASS: "password"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: signer-config
  namespace: default
data:
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_BUCKET: "docs-storage"
  MINIO_REGION: "us-east-1"

  REDIS_ADDR: "redis:6379"

  PDFSIGN_URL: "http://pdfsigner:8090/sign"
  MAILER_URL: "http://mailer-svc:8083/send"
  PUBLIC_BASE_URL: "http://signer.local"
  MAILER_LOG_BODY: "true"
  HTTP_READ_HEADER_TIMEOUT: "5s"
  HTTP_READ_TIMEOUT: "15s"
  HTTP_WRITE_TIMEOUT: "120s"
  HTTP_IDLE_TIMEOUT: "60s"
  SHUTDOWN_TIMEOUT: "15s"
  DEPENDENCY_TIMEOUT: "30s"
  PDFSIGN_TIMEOUT: "60s"
  UPLOAD_MAX_BYTES: "10485760"
  JSON_MAX_BYTES: "1048576"
  PDFSIGNER_MAX_FILE_SIZE: "10MB"
  PDFSIGNER_MAX_REQUEST_SIZE: "11MB"
  PDFSIGNER_MAX_HEADER_SIZE: "16KB"

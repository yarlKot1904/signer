apiVersion: v1
kind: Secret
metadata:
  name: signer-secrets
  namespace: default
type: Opaque
stringData:
  MINIO_ID: "__CHANGE_ME__"
  MINIO_SECRET: "__CHANGE_ME__"

  POSTGRES_USER: "user"
  POSTGRES_PASSWORD: "__CHANGE_ME__"
  POSTGRES_DB: "signer_db"

  DB_DSN: "postgres://user:__CHANGE_ME__@postgres:5432/signer_db"
  RABBIT_URL: "amqp://user:__CHANGE_ME__@rabbitmq:5672/"

  MASTER_KEY_HEX: "__PUT_64_HEX_HERE__"
  RABBIT_USER: "user"
  RABBIT_PASS: "__CHANGE_ME__"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: signer-config
  namespace: default
data:
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_BUCKET: "docs-storage"
  MINIO_REGION: "us-east-1"

  REDIS_ADDR: "redis:6379"

  PDFSIGN_URL: "http://pdfsigner:8090/sign"
  HTTP_READ_HEADER_TIMEOUT: "5s"
  HTTP_READ_TIMEOUT: "15s"
  HTTP_WRITE_TIMEOUT: "120s"
  HTTP_IDLE_TIMEOUT: "60s"
  SHUTDOWN_TIMEOUT: "15s"
  DEPENDENCY_TIMEOUT: "30s"
  PDFSIGN_TIMEOUT: "60s"
  UPLOAD_MAX_BYTES: "10485760"
  JSON_MAX_BYTES: "1048576"
  PDFSIGNER_MAX_FILE_SIZE: "10MB"
  PDFSIGNER_MAX_REQUEST_SIZE: "11MB"
  PDFSIGNER_MAX_HEADER_SIZE: "16KB"

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoSigner - Проверка PDF</title>
    <link href="https://releases.transloadit.com/uppy/v3.25.0/uppy.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 560px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        h2 {
            margin: 0;
            color: #333;
        }

        .nav-link {
            color: #2ea7e0;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .nav-link:hover { text-decoration: underline; }

        .form-group { margin-bottom: 1.25rem; }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #666;
            font-size: 0.9rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: #2ea7e0;
            outline: none;
        }

        #uppy-dashboard { margin-top: 12px; }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        #verify-upload {
            background: #2ea7e0;
            color: white;
        }

        #verify-upload:hover { background: #1d8fc5; }
        #verify-upload:disabled { background: #b7dcea; cursor: not-allowed; }

        #verify-token {
            background: #eef2f7;
            color: #334155;
        }

        #verify-token:hover { background: #e2e8f0; }
        #verify-token:disabled { background: #e2e8f0; cursor: not-allowed; }

        #status {
            display: none;
            margin-top: 18px;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.45;
            white-space: pre-wrap;
        }

        #status.success {
            display: block;
            background: #e8f5e9;
            color: #2e7d32;
        }

        #status.error {
            display: block;
            background: #ffebee;
            color: #c62828;
        }

        #status.warning {
            display: block;
            background: #fff8e1;
            color: #8d6e00;
        }

        #result {
            display: none;
            margin-top: 18px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 14px;
        }

        #result.visible { display: block; }

        .result-row {
            margin-bottom: 10px;
            color: #334155;
            font-size: 0.95rem;
        }

        .result-row:last-child { margin-bottom: 0; }

        .result-label {
            color: #64748b;
            margin-right: 8px;
        }

        .result-json {
            margin-top: 14px;
            padding: 12px;
            border-radius: 8px;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 0.88rem;
            overflow: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="topbar">
        <h2>Проверка PDF</h2>
        <a class="nav-link" href="/">К загрузке</a>
    </div>

    <div class="form-group">
        <label for="token">Токен</label>
        <input type="text" id="token" placeholder="uuid токен">
    </div>

    <div id="uppy-dashboard"></div>

    <div class="actions">
        <button id="verify-upload">Проверить PDF</button>
        <button id="verify-token">Проверить токен</button>
    </div>

    <div id="status"></div>
    <div id="result"></div>
</div>

<script type="module">
    import { Uppy, Dashboard, Tus } from "https://releases.transloadit.com/uppy/v3.25.0/uppy.min.mjs";

    const statusBox = document.getElementById('status');
    const resultBox = document.getElementById('result');
    const uploadButton = document.getElementById('verify-upload');
    const tokenButton = document.getElementById('verify-token');
    const tokenInput = document.getElementById('token');

    let pendingVerifyToken = null;

    const uppy = new Uppy({
        debug: true,
        autoProceed: false,
        restrictions: {
            maxNumberOfFiles: 1,
            allowedFileTypes: ['.pdf'],
            maxFileSize: 50 * 1024 * 1024
        }
    });

    uppy.use(Dashboard, {
        inline: true,
        target: '#uppy-dashboard',
        height: 300,
        proudlyDisplayPoweredByUppy: false,
        hideUploadButton: true,
        note: 'PDF, до 50 MB'
    });

    uppy.use(Tus, {
        endpoint: '/verify-files/',
        chunkSize: 5 * 1024 * 1024
    });

    uppy.on('complete', async (result) => {
        if (result.failed.length > 0) {
            showStatus('Ошибка загрузки файла.', 'error');
            setUploadButtonState(false);
            return;
        }

        if (result.successful.length === 0 || !pendingVerifyToken) {
            showStatus('Файл не был загружен.', 'error');
            setUploadButtonState(false);
            return;
        }

        await verifyByUploadToken(pendingVerifyToken);
        pendingVerifyToken = null;
    });

    uploadButton.addEventListener('click', startUploadVerification);
    tokenButton.addEventListener('click', verifyToken);

    async function startUploadVerification() {
        hideStatus();
        const file = uppy.getFiles()[0];
        if (!file) {
            showStatus('Выберите PDF файл.', 'error');
            return;
        }

        pendingVerifyToken = createVerifyToken();
        uppy.setFileMeta(file.id, {
            verifyToken: pendingVerifyToken
        });

        setUploadButtonState(true);
        showStatus('Загружаем файл через Tus...', 'warning');

        try {
            await uppy.upload();
        } catch (error) {
            pendingVerifyToken = null;
            setUploadButtonState(false);
            showStatus('Ошибка загрузки файла.', 'error');
        }
    }

    async function verifyByUploadToken(uploadToken) {
        showStatus('Проверяем загруженный PDF...', 'warning');

        try {
            const response = await fetch('/api/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ upload_token: uploadToken })
            });

            const data = await response.json();
            renderResult(data);

            if (!response.ok) {
                showStatus(data.error || 'Ошибка проверки.', 'error');
                return;
            }

            showStatus(buildStatusMessage(data), mapStatusToTone(data.status));
        } catch (error) {
            showStatus('Ошибка сети.', 'error');
        } finally {
            setUploadButtonState(false);
        }
    }

    async function verifyToken() {
        hideStatus();
        const token = tokenInput.value.trim();
        if (!token) {
            showStatus('Введите токен.', 'error');
            return;
        }

        tokenButton.disabled = true;
        tokenButton.innerText = 'Проверяем...';

        try {
            const response = await fetch('/api/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });

            const data = await response.json();
            renderResult(data);

            if (!response.ok) {
                showStatus(data.error || 'Ошибка проверки.', 'error');
                return;
            }

            showStatus(buildStatusMessage(data), mapStatusToTone(data.status));
        } catch (error) {
            showStatus('Ошибка сети.', 'error');
        } finally {
            tokenButton.disabled = false;
            tokenButton.innerText = 'Проверить токен';
        }
    }

    function setUploadButtonState(isBusy) {
        uploadButton.disabled = isBusy;
        uploadButton.innerText = isBusy ? 'Загрузка...' : 'Проверить PDF';
    }

    function renderResult(data) {
        resultBox.className = 'visible';
        resultBox.innerHTML = `
            <div class="result-row"><span class="result-label">Статус:</span>${escapeHtml(data.status || '-')}</div>
            <div class="result-row"><span class="result-label">Подпись:</span>${formatBool(data.signature_present)}</div>
            <div class="result-row"><span class="result-label">Целостность:</span>${formatBool(data.integrity_valid)}</div>
            <div class="result-row"><span class="result-label">CN:</span>${escapeHtml(data.signer_cn || '—')}</div>
            <div class="result-row"><span class="result-label">Subject:</span>${escapeHtml(data.signer_subject || '—')}</div>
            <div class="result-row"><span class="result-label">Время:</span>${escapeHtml(data.signing_time || '—')}</div>
            <div class="result-row"><span class="result-label">Self-signed:</span>${formatNullableBool(data.certificate_self_signed)}</div>
            <pre class="result-json">${escapeHtml(JSON.stringify(data, null, 2))}</pre>
        `;
    }

    function buildStatusMessage(data) {
        switch (data.status) {
            case 'verified':
                return 'Подпись валидна.';
            case 'unknown_document':
                return 'Документ не найден в реестре сервиса.';
            case 'unsigned':
                return 'Подпись не найдена.';
            case 'invalid_signature':
                return 'Подпись найдена, но невалидна.';
            default:
                return data.error || 'Ошибка проверки.';
        }
    }

    function mapStatusToTone(status) {
        if (status === 'verified') return 'success';
        if (status === 'unsigned') return 'warning';
        return 'error';
    }

    function formatBool(value) {
        return value ? 'Да' : 'Нет';
    }

    function formatNullableBool(value) {
        if (value === true) return 'Да';
        if (value === false) return 'Нет';
        return 'Неизвестно';
    }

    function showStatus(text, type) {
        statusBox.textContent = text;
        statusBox.className = type;
    }

    function hideStatus() {
        statusBox.textContent = '';
        statusBox.className = '';
    }

    function createVerifyToken() {
        if (window.crypto && window.crypto.randomUUID) {
            return window.crypto.randomUUID();
        }

        return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;');
    }
</script>

</body>
</html>
